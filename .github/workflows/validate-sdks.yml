name: Validate SDKs

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: sdk-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  load-matrix:
    runs-on: ubuntu-latest
    outputs:
      spec-changed: ${{ steps.filter.outputs.spec }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            spec:
              - 'spec/**'

      - name: Load SDK matrix
        id: set-matrix
        run: echo "matrix=$(jq -c . .github/sdk-matrix.json)" >> "$GITHUB_OUTPUT"

  sdk_build:
    name: sdk_build (${{ matrix.language }})
    needs: load-matrix
    if: needs.load-matrix.outputs.spec-changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-matrix.outputs.matrix) }}

    steps:
      - name: Checkout openapi-spec
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: openapi-spec

      - name: Checkout live SDK
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ matrix.sdk_repo }}
          path: ${{ matrix.sdk_checkout_path }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: openapi-spec/package-lock.json

      - name: Install dependencies
        working-directory: openapi-spec
        run: npm ci

      - name: Detect SDK runtime version
        id: sdk-version
        working-directory: ${{ matrix.sdk_checkout_path }}
        run: |
          case "${{ matrix.language }}" in
            ruby)   echo "version=$(cat .ruby-version)" >> "$GITHUB_OUTPUT" ;;
            python) echo "version=$(cat .python-version 2>/dev/null || grep -Po '(?<=requires-python.*>=)\d+\.\d+' pyproject.toml)" >> "$GITHUB_OUTPUT" ;;
            go)     echo "version=$(grep '^go ' go.mod | awk '{print $2}')" >> "$GITHUB_OUTPUT" ;;
            dotnet) echo "version=$(grep -Po '(?<=<TargetFramework>net)\d+\.\d+' $(find . -name '*.csproj' -path '*/src/*' | head -1))" >> "$GITHUB_OUTPUT" ;;
            php)    echo "version=$(grep -Po '\"php\":\s*\"\^?\K[\d.]+' composer.json)" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Setup Ruby
        if: matrix.language == 'ruby'
        uses: ruby/setup-ruby@0cb964fd540e0a24c900370abf38a33466142735 # v1.305.0
        with:
          ruby-version: ${{ steps.sdk-version.outputs.version }}
          bundler-cache: true
          working-directory: ${{ matrix.sdk_checkout_path }}

      - name: Setup Python
        if: matrix.language == 'python'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ steps.sdk-version.outputs.version }}

      - name: Setup uv
        if: matrix.language == 'python'
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
          cache-dependency-glob: '${{ matrix.sdk_checkout_path }}/**/uv.lock'

      - name: Setup Go
        if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ steps.sdk-version.outputs.version }}

      - name: Setup .NET
        if: matrix.language == 'dotnet'
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ steps.sdk-version.outputs.version }}

      - name: Setup PHP
        if: matrix.language == 'php'
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f # 2.37.0
        with:
          php-version: ${{ steps.sdk-version.outputs.version }}

      - name: Extract baseline snapshot
        working-directory: openapi-spec
        run: |
          npm run sdk:compat-extract -- \
            --lang ${{ matrix.language }} \
            --sdk-root "$GITHUB_WORKSPACE/${{ matrix.sdk_checkout_path }}"

      - name: Generate SDK
        working-directory: openapi-spec
        run: npm run sdk:generate -- --lang ${{ matrix.language }} --output "$GITHUB_WORKSPACE/${{ matrix.sdk_checkout_path }}"

      - name: Run SDK CI
        working-directory: ${{ matrix.sdk_checkout_path }}
        run: |
          if [ -x script/ci ]; then
            script/ci
          elif [ -x scripts/ci ]; then
            scripts/ci
          else
            echo "No script/ci or scripts/ci found, skipping"
          fi

      - name: Extract candidate snapshot
        working-directory: openapi-spec
        run: |
          npm run sdk:compat-extract -- \
            --lang ${{ matrix.language }} \
            --sdk-root "$GITHUB_WORKSPACE/${{ matrix.sdk_checkout_path }}" \
            --output .oagen/${{ matrix.language }}/sdk

      - name: Copy manifest for diagnostics
        if: always()
        working-directory: openapi-spec
        run: |
          mkdir -p .oagen/${{ matrix.language }}/sdk
          cp "$GITHUB_WORKSPACE/${{ matrix.sdk_checkout_path }}/.oagen-manifest.json" \
             .oagen/${{ matrix.language }}/sdk/ 2>/dev/null || true

      - name: Compat diff
        id: compat-diff
        continue-on-error: true
        working-directory: openapi-spec
        run: npm run sdk:compat-diff -- --lang ${{ matrix.language }}

      - name: Compat summary
        if: always() && steps.compat-diff.outcome != 'skipped'
        working-directory: openapi-spec
        run: |
          REPORT=".oagen/${{ matrix.language }}/compat-report.json"
          if [ -f "$REPORT" ]; then
            npm run sdk:compat-summary -- --report "$REPORT" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: oagen-diagnostics-${{ matrix.language }}
          path: openapi-spec/.oagen/${{ matrix.language }}/
          retention-days: 14

  sdk-validation:
    runs-on: ubuntu-latest
    needs: [load-matrix, sdk_build]
    if: always()
    steps:
      - name: Checkout openapi-spec
        if: needs.load-matrix.outputs.spec-changed == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        if: needs.load-matrix.outputs.spec-changed == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Download diagnostics
        if: needs.load-matrix.outputs.spec-changed == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: oagen-diagnostics-*
          path: sdk-diagnostics

      - name: Render PR comment
        if: needs.load-matrix.outputs.spec-changed == 'true'
        run: |
          node scripts/sdk-compat-pr-comment.mjs \
            --artifacts-root sdk-diagnostics \
            --build-result "${{ needs.sdk_build.result }}" \
            --output /tmp/sdk-compat-comment.md

      - name: Upsert PR comment
        if: github.event_name == 'pull_request' && needs.load-matrix.outputs.spec-changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          jq -n --rawfile body /tmp/sdk-compat-comment.md '{body: $body}' > /tmp/sdk-compat-comment.json

          COMMENT_ID="$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("<!-- sdk-validation-comment -->")) | .id' \
            | head -n 1)"

          if [[ -n "$COMMENT_ID" ]]; then
            gh api \
              --method PATCH \
              "repos/$REPO/issues/comments/$COMMENT_ID" \
              --input /tmp/sdk-compat-comment.json
          else
            gh api \
              --method POST \
              "repos/$REPO/issues/$PR_NUMBER/comments" \
              --input /tmp/sdk-compat-comment.json
          fi

      - name: Check result
        run: |
          if [[ "${{ needs.load-matrix.outputs.spec-changed }}" != "true" ]]; then
            echo "No spec changes, skipping SDK validation"
            exit 0
          fi
          if [[ "${{ needs.sdk_build.result }}" != "success" ]]; then
            echo "SDK build failed"
            exit 1
          fi
